<p>「人が描いた」イラストでも、<strong>依拠性＋類似性</strong> が認められれば<br />
著作権・肖像権・パブリシティ権の問題になる</p>
<ul>

<li>「資料としてSNS写真を見た」だけでも、<strong>そっくり</strong> に描けば問題になる</li>
<li>同じ構造が、AIの <strong>Image to Image</strong> でも起きる（後述）</li>
</ul>
<blockquote>
<p>AI以前から、著作権の物差しは <strong>同じ</strong><br />
「依拠性」「類似性」は今日この後ずっと出てくるキーワード</p>
</blockquote>

<p>「銀座今昔きもの大市」の告知ポスターで、<br />
AI生成のフリー素材を使ったところ<br />
着物が <strong>左前</strong>（亡くなった方の着付け＝死装束）に</p>
<ul>
<li>SNSで「左前は駄目でしょ」「死装束では」と批判殺到</li>
<li>主催者は <strong>修正せず</strong>「ファッションに決まりごとはない」と回答</li>
<li>結果として <strong>イベントの印象に深刻なダメージ</strong></li>
</ul>
<p><span class="cite">参考：J-CAST「着物イベントの『左前』ポスターが物議」（2023年4月）</span></p>

<p>法律上の <strong>著作権侵害ではない</strong> が、<strong>炎上リスクは法律と別</strong> に存在する</p>
<ul>
<li>AIは「<strong>もっともらしい嘘</strong>」をビジュアルでも出す</li>
<li>文化的な常識（左前／右前、季節感、紋章、宗教モチーフ）は外しがち</li>
<li><strong>クリエイターによる最終チェックがない</strong> と、ブランドが傷つく</li>
</ul>
<blockquote>
<p>「AIに作らせた」では言い訳にならない<br />
出した人が責任を負うのは、絵でも文章でも同じ</p>
</blockquote>

<p>「あれもダメ、これもダメ」を覚える時間ではない</p>

<h2 id="%E4%BD%9C%E3%81%A3%E3%81%9F%E4%BA%BA%E3%81%AE%E6%A8%A9%E5%88%A9%E3%82%92%E5%AE%88%E3%82%8B%E4%BB%95%E7%B5%84%E3%81%BF">作った人の権利を守る仕組み</h2>
<ul>
<li>絵、文章、音楽、映像、写真... すべて対象</li>
<li>「勝手に使われない／真似されない」を守る</li>
<li>申請しなくても、<strong>作った瞬間に発生する</strong></li>
</ul>
<p>そして... AI時代だから新しくできたルールではなく、<br />
<strong>昔からあるルールがAIにも当てはまる</strong></p>

<h1 id="%E8%91%97%E4%BD%9C%E7%89%A9%E3%81%AE%E5%AE%9A%E7%BE%A9%E8%91%97%E4%BD%9C%E6%A8%A9%E6%B3%95">著作物の定義（著作権法）</h1>
<blockquote>
<p>「思想又は感情を <strong>創作的に表現</strong> したものであつて、<br />
文芸、学術、美術又は音楽の範囲に属するもの」<br />
（著作権法 第2条第1項第1号）</p>
</blockquote>
<p>ポイントは3つ</p>
<ul>
<li><strong>思想・感情</strong> がある（単なるデータではない）</li>
<li><strong>創作的に</strong> 表現されている（ありふれていない）</li>
<li><strong>表現</strong> されている（頭の中のアイデアではない）</li>
</ul>
</section>

<tr>

<td>日本舞踊、バレエ、ダンス、パントマイムの振付</td>
</tr>
<tr>
<td><strong>美術</strong></td>
<td><strong>絵画、版画、彫刻、マンガ、書、舞台装置、工芸</strong></td>
</tr>
<tr>
<td>建築</td>
<td>芸術的な建築物</td>
</tr>
<tr>
<td>地図・図形</td>
<td>地図、設計図、立体模型、地球儀</td>
</tr>
<tr>

<tr>

</tr>
<tr>

<h1 id="%E8%A1%A8%E7%8F%BE%E3%81%A8%E3%82%A2%E3%82%A4%E3%83%87%E3%82%A2">「表現」と「アイデア」</h1>
<p>なぜアイデアは保護されないのか？</p>
<ul>
<li>アイデアを独占できると、<strong>新しい創作が生まれにくくなる</strong></li>
<li>自由に使えるからこそ、表現の <strong>多様性</strong> が生まれる</li>
<li>結果として「文化の発展」につながる、と考えられている</li>
</ul>
<blockquote>
<p>アイデアと表現の <strong>境目</strong> は、ケースごとに判断<br />
「ここまではアイデア／ここからは表現」が <strong>難しいケースも多い</strong></p>
</blockquote>

<table>
<thead>
<tr>
<th>段階</th>
<th>何が起きる？</th>
<th>主な論点</th>
</tr>
</thead>
<tbody>
<tr>
<td>① <strong>学習</strong></td>
<td>大量データをAIに読み込ませる</td>
<td>誰のデータが使われた？</td>
</tr>
<tr>
<td>② <strong>生成</strong></td>
<td>プロンプトで画像・文章を出力</td>
<td>既存作品にそっくりにしてないか？</td>
</tr>
<tr>
<td>③ <strong>利用</strong></td>
<td>SNS投稿・提出・販売</td>
<td>用途は許されている？</td>
</tr>
</tbody>
</table>
<p>「AIで作った」だけでまとめて議論しない</p>

<blockquote>
<p>情報解析等に伴う著作物の利用＝<br />
「著作物に表現された <strong>思想又は感情の享受を目的としない</strong> 利用」<br />
は、原則として <strong>著作権者の許諾なく</strong> 行うことができる</p>
</blockquote>
<p>つまり</p>
<ul>
<li>AIの学習データとして著作物を <strong>複製・収集することは原則OK</strong></li>
<li>ただし以下は <strong>NG</strong>：
<ul>
<li>不当にアップロードされた違法データ（海賊版）を使う</li>
<li>「情報解析用としてライセンスされた素材」を勝手に使う</li>
<li>特定クリエイターの作品 <strong>だけ</strong> を集中的に学習させ、類似物を作る目的</li>
</ul>
</li>
</ul>
</section>

<h1 id="%E2%91%A1-%E7%94%9F%E6%88%90%E6%AE%B5%E9%9A%8E%E3%81%A7%E8%B5%B7%E3%81%8D%E3%82%84%E3%81%99%E3%81%84%E5%95%8F%E9%A1%8C">② 生成段階で起きやすい問題</h1>
<h3 id="image-to-image%E3%81%AE%E8%90%BD%E3%81%A8%E3%81%97%E7%A9%B4">「Image to Image」の落とし穴</h3>
<p>他人のイラストを入力して「これに似たものを」と生成する行為</p>
<ul>
<li>AI利用者がその作品を <strong>明確に認識して使った</strong> 証拠になる</li>
<li>→ <strong>依拠性が認められやすい</strong>（前ページのフロー参照）</li>
<li>出力が元イラストと似ていれば、<strong>著作権侵害</strong></li>
</ul>
<h3 id="%E3%81%9D%E3%82%82%E3%81%9D%E3%82%82%E5%85%A5%E5%8A%9B%E3%81%99%E3%82%8B%E8%A1%8C%E7%82%BA%E3%81%9D%E3%81%AE%E3%82%82%E3%81%AE">そもそも入力する行為そのもの</h3>
<ul>
<li>著作権者の許諾なく他人のイラストをAIに <strong>入力・アップロード</strong></li>

<ul>

<li>「学習に使わない」≠「サーバーに保存されない」</li>

</ul>

<h3 id="1-%E9%A1%9E%E4%BC%BC%E7%89%A9%E3%81%AB%E3%81%AA%E3%81%A3%E3%81%A6%E3%81%84%E3%81%AA%E3%81%84%E3%81%8B%E7%A2%BA%E8%AA%8D%E3%81%99%E3%82%8B">1. 類似物になっていないか確認する</h3>
<p>公開する前に、画像検索などで <strong>既存作品と似ていないか</strong> チェック</p>
<h3 id="2-%E4%BB%96%E4%BA%BA%E3%81%AE%E4%BD%9C%E5%93%81%E3%82%92%E3%81%9D%E3%81%AE%E3%81%BE%E3%81%BE%E5%85%A5%E5%8A%9B%E3%81%97%E3%81%AA%E3%81%84">2. 他人の作品をそのまま入力しない</h3>

<h3 id="3-%E3%83%97%E3%83%AD%E3%83%B3%E3%83%97%E3%83%88%E7%94%9F%E6%88%90%E9%81%8E%E7%A8%8B%E3%82%92%E4%BF%9D%E5%AD%98%E3%81%97%E3%81%A6%E3%81%8A%E3%81%8F">3. プロンプト（生成過程）を保存しておく</h3>

<strong>生成に使った指示文</strong> を残しておく</p>

<td>強い</td>
